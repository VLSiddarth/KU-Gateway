apiVersion: v1
kind: Service
metadata:
  name: ku-gateway
  labels:
    app: ku-gateway
  annotations:
    # Optional: for internal load balancer / cloud provider
    # service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: ClusterIP          # Change to LoadBalancer for external access
  selector:
    app: ku-gateway        # Must match the label in your Deployment
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  sessionAffinity: None